name: Build and Release

on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        target: [linux-x64, win-x64]
        include:
          - os: ubuntu-22.04
            target: linux-x64
          - os: windows-latest
            target: win-x64
    runs-on: ${{ matrix.os }}
    steps:
    - name: Checkout Source
      uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744
    - name: Install GCC 13 (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo add-apt-repository ppa:ubuntu-toolchain-r/test -y
        sudo apt update
        sudo apt install -y gcc-13 g++-13
        sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-13 100 \
                                 --slave /usr/bin/g++ g++ /usr/bin/g++-13
    - name: Install OpenCL (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt update
        sudo apt install -y ocl-icd-opencl-dev opencl-headers
    - name: Install OpenCL (Windows)
      if: runner.os == 'Windows'
      run: |
        git clone https://github.com/microsoft/vcpkg.git
        ./vcpkg/bootstrap-vcpkg.bat
        ./vcpkg/vcpkg --triplet=x64-windows install opencl
    - name: Get CMake
      uses: lukka/get-cmake@82813008e734bbee947d1fbde72035b0aa989da9
    - name: Configure CMake (Windows)
      if: runner.os == 'Windows'
      run: cmake -S . -B . -DCMAKE_TOOLCHAIN_FILE="vcpkg/scripts/buildsystems/vcpkg.cmake"
    - name: Configure CMake (Linux)
      if: runner.os == 'Linux'
      run: cmake -S . -B .
    - name: Build
      run: cmake --build . --config Release
    - name: Zip (Linux)
      if: runner.os == 'Linux'
      uses: thedoctor0/zip-release@78b32010bd8b7722906817a1f9e2a7190a182d0c
      with:
        type: 'zip'
        path: 'bruteforcer'
        filename: Release-${{ matrix.target }}.zip
    - name: Zip (Windows)
      if: runner.os == 'Windows'
      uses: thedoctor0/zip-release@78b32010bd8b7722906817a1f9e2a7190a182d0c
      with:
        type: 'zip'
        directory: 'Release'
        path: 'bruteforcer.exe'
        filename: ../Release-${{ matrix.target }}.zip
    - name: Add to Release
      uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        files: Release-${{ matrix.target }}.zip
